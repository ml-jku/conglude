_target_: conglude.datamodule.ConGLUDeDataset

dataset_dir: ./data/datasets/test_datasets/coach420
dataset_name: coach420
task: pp
structure_based: true
split: test
batch_size: 64
fingerprint_type: null
load_descriptors: false

# processing options
extract_ligands: known # extract known ligands from csv file
select_chains: chain_id # select protein chains based on chain ids provided in csv file
labeled_smiles: none # no smiles files provided
multi_ligand: true # multiple ligands per target
calc_mol_feats: false # dataset for pocket prediction, no need to calculate ligand features
